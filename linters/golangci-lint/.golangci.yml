# ============================================================
# golangci-lint configuration — Lovable Email Reader
# ============================================================
#
# Pinned per:
#   spec/21-app/04-coding-standards.md §1     (depguard rule)
#   spec/21-app/07-architecture.md §"Tooling" (lint pipeline)
#
# Run locally:
#   golangci-lint run --config linters/golangci-lint/.golangci.yml
#
# Run with the Fyne build excluded (sandbox / CI mode):
#   golangci-lint run --build-tags nofyne \
#                     --config linters/golangci-lint/.golangci.yml
#
# This config is intentionally minimal at slice-#120 baseline:
# enable the standard linters that catch the classes of bugs the
# project's AST guards do NOT cover (vet, ineffassign, unused,
# staticcheck, errcheck), plus the project-specific `depguard` rule
# that pins the `internal/core` surface contract.
# ============================================================

run:
  timeout: 5m
  tests: true
  # The project uses `nofyne` to compile without cgo on CI / sandbox.
  # CI invocations override this via --build-tags.
  build-tags: []

linters:
  disable-all: true
  enable:
    - govet         # standard go vet rules
    - ineffassign   # ineffectual assignment detector
    - unused        # unused symbol detector
    - staticcheck   # advanced static analysis (SA*, ST*, S* checks)
    - errcheck      # unchecked-error detector
    - gosimple      # simplification suggestions
    - depguard      # spec §04 §1: import-graph pinning

linters-settings:
  depguard:
    # Spec §04 §1 — "internal/core is the only surface cmd/* and
    # internal/ui/* may import. Lower packages are private to core."
    rules:
      ui-may-not-import-lower-packages:
        list-mode: lax
        files:
          - "**/internal/ui/**/*.go"
        deny:
          - pkg: "github.com/lovable/email-read/internal/store"
            desc: "internal/ui must go through internal/core (spec §04 §1)"
          - pkg: "github.com/lovable/email-read/internal/mailclient"
            desc: "internal/ui must go through internal/core (spec §04 §1)"
          - pkg: "github.com/lovable/email-read/internal/watcher"
            desc: "internal/ui must go through internal/core (spec §04 §1)"
      cmd-may-not-import-lower-packages:
        list-mode: lax
        files:
          - "**/cmd/**/*.go"
        deny:
          - pkg: "github.com/lovable/email-read/internal/store"
            desc: "cmd/* must go through internal/core (spec §04 §1)"
          - pkg: "github.com/lovable/email-read/internal/mailclient"
            desc: "cmd/* must go through internal/core (spec §04 §1)"
          - pkg: "github.com/lovable/email-read/internal/watcher"
            desc: "cmd/* must go through internal/core (spec §04 §1)"

  errcheck:
    # The project tolerates unchecked errors on `Close()` defers and
    # log Printf calls — both are documented patterns. This list
    # narrows errcheck to genuine bugs.
    exclude-functions:
      - (io.Closer).Close
      - fmt.Print
      - fmt.Printf
      - fmt.Println
      - (*log.Logger).Print
      - (*log.Logger).Printf
      - (*log.Logger).Println

issues:
  # Sandbox-friendly: don't fail on a single legacy issue while the
  # backlog rolls down. Tighten in a follow-up slice once the
  # baseline lands clean across the team.
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - vendor
    - testdata
    - linter-scripts  # contains a polyglot validate-guidelines.go
    - spec
